<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Department</title>
</head>

<body>
    <h2>Department Controller</h2>

    <h3>POST /api/hospital/departments — Create Department</h3>
    <input id="cd-name" placeholder="name">
    <input id="cd-description" placeholder="description">
    <button onclick="createDepartment()">Create</button>

    <h3>GET /api/hospital/departments/{id} — Get by ID</h3>
    <input id="gd-id" placeholder="id (Long)">
    <button onclick="getById()">Get</button>

    <h3>GET /api/hospital/departments — Get All</h3>
    <button onclick="getAll()">Get All</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
