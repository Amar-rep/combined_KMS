<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>

<body>
    <h2>Document Controller</h2>

    <h3>POST /api/documents — Create/Upload Document</h3>
    <input id="cd-sender_keccak" placeholder="sender_keccak">
    <input id="cd-group_id" placeholder="group_id">
    <input id="cd-group_key_base64" placeholder="group_key_base64">
    <input id="cd-nonce" placeholder="nonce">
    <input id="cd-signature" placeholder="signature">
    <input type="file" id="cd-fileInput">
    <input id="cd-filename" placeholder="filename (optional)">
    <input id="cd-metadata" placeholder='metadata (JSON, e.g. {"type":"report"})'>
    <button onclick="createDocument()">Upload</button>

    <h3>POST /api/documents/download — Download Document</h3>
    <input id="dl-sender_keccak" placeholder="sender_keccak">
    <input id="dl-groupId" placeholder="groupId">
    <input id="dl-recordId" placeholder="recordId">
    <input id="dl-group_key_base64" placeholder="group_key_base64">
    <input id="dl-nonce" placeholder="nonce">
    <input id="dl-signature" placeholder="signature">
    <button onclick="downloadDocument()">Download</button>

    <h3>POST /api/documents/access — Give Access</h3>
    <input id="ga-sender_keccak" placeholder="sender_keccak (patient keccak)">
    <input id="ga-hospital_id" placeholder="hospital_id">
    <input id="ga-receiver_keccak" placeholder="receiver_keccak (doctor keccak)">
    <input id="ga-notificationId" placeholder="notificationId (Long)">
    <input id="ga-groupId" placeholder="groupId">
    <input id="ga-nonce" placeholder="nonce">
    <input id="ga-signature" placeholder="signature">
    <button onclick="giveAccess()">Give Access</button>

    <h3>POST /api/documents/revoke-access — Revoke Access</h3>
    <input id="ra-sender_keccak" placeholder="sender_keccak">
    <input id="ra-groupId" placeholder="groupId">
    <input id="ra-nonce" placeholder="nonce">
    <input id="ra-signature" placeholder="signature">
    <button onclick="revokeAccess()">Revoke Access</button>

    <h3>POST /api/documents/allow-access-inter-hospital — Allow Access Inter-Hospital</h3>
    <input id="ih-documentRequestId" placeholder="documentRequestId (Long)">
    <input id="ih-receiverIdKeccak" placeholder="receiverIdKeccak">
    <input id="ih-nonce" placeholder="nonce">
    <input id="ih-signature" placeholder="signature">
    <button onclick="allowAccessInterHospital()">Allow Access Inter-Hospital</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
