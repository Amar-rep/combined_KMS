<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Group Access Controller</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Group Access Controller</h1>
    <div id="response-box">
        <pre id="response-output">Response will appear here...</pre>
    </div>

    <!-- Sync From KMS -->
    <section class="card">
        <h2>Sync Group Access From KMS <span class="badge post">POST</span></h2>
        <p class="endpoint">POST /api/group-access/sync</p>
        <div class="form-group">
            <label>Hospital ID</label>
            <input type="text" id="sync-hospitalId" placeholder="Hospital ID" />
        </div>
        <button onclick="syncFromKms()">Sync From KMS</button>
    </section>

    <!-- Get By Hospital ID -->
    <section class="card">
        <h2>Get By Hospital ID <span class="badge get">GET</span></h2>
        <p class="endpoint">GET /api/group-access/hospital/{hospitalId}</p>
        <div class="form-group">
            <label>Hospital ID</label>
            <input type="text" id="gh-hospitalId" placeholder="Hospital ID" />
        </div>
        <button onclick="getByHospitalId()">Get By Hospital</button>
    </section>

    <!-- Get Encrypted Group Key -->
    <section class="card">
        <h2>Get Encrypted Group Key <span class="badge get">GET</span></h2>
        <p class="endpoint">GET /api/group-access/key?groupId=&amp;doctorId=</p>
        <div class="form-group">
            <label>Group ID</label>
            <input type="text" id="gk-groupId" placeholder="Group ID" />
        </div>
        <div class="form-group">
            <label>Doctor ID</label>
            <input type="text" id="gk-doctorId" placeholder="Doctor ID (Keccak)" />
        </div>
        <button onclick="getEncryptedGroupKey()">Get Encrypted Key</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
