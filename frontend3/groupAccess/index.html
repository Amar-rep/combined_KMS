<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Group Access</title>
    <!-- eccrypto-js for ECC decryption -->
    <script src="https://cdn.jsdelivr.net/npm/eccrypto-js@5.2.2/dist/eccrypto.umd.min.js"></script>
</head>

<body>
    <h2>Group Access Controller</h2>

    <h3>POST /api/group-access/sync — Sync from KMS</h3>
    <input id="sy-hospitalId" placeholder="hospitalId">
    <button onclick="syncFromKms()">Sync</button>

    <h3>GET /api/group-access/hospital/{hospitalId} — Get by Hospital ID</h3>
    <input id="gh-hospitalId" placeholder="hospitalId">
    <button onclick="getByHospitalId()">Get</button>

    <h3>GET /api/group-access/key?groupId=&amp;doctorId= — Get Encrypted Group Key</h3>
    <input id="gk-groupId" placeholder="groupId">
    <input id="gk-doctorId" placeholder="doctorId">
    <textarea id="gk-privateKey" placeholder="Doctor's Private Key (Hex format without 0x)" rows="4"
        cols="50"></textarea>
    <button onclick="getEncryptedGroupKey()">Get Key & Decrypt</button>

    <h3>Decrypted Group Key</h3>
    <pre id="decrypted-key-output"></pre>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
