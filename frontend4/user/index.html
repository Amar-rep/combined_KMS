<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>KMS User Controller</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>KMS User Controller</h1>
    <div id="response-box">
        <pre id="response-output">Response will appear here...</pre>
    </div>

    <!-- Register User -->
    <section class="card">
        <h2>Register User <span class="badge post">POST</span></h2>
        <p class="endpoint">POST /api/kms/users/register</p>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="ru-name" placeholder="Full Name" />
        </div>
        <div class="form-group">
            <label>Physical Address</label>
            <input type="text" id="ru-address" placeholder="123 Street Ave" />
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="ru-phone" placeholder="123-456-7890" />
        </div>
        <div class="form-group">
            <label>Public Key (Base64)</label>
            <input type="text" id="ru-pubkey" placeholder="Base64 Public Key" />
        </div>
        <button onclick="registerUser()">Register User</button>
    </section>

    <!-- Get User By Keccak ID -->
    <section class="card">
        <h2>Get User By Keccak ID <span class="badge get">GET</span></h2>
        <p class="endpoint">GET /api/kms/users/{userIdKeccak}</p>
        <div class="form-group">
            <label>User Keccak ID</label>
            <input type="text" id="gu-keccak" placeholder="0x..." />
        </div>
        <button onclick="getUserByKeccak()">Get User</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
