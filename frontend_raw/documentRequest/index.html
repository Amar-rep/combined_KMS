<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document Request</title>
</head>

<body>
    <h2>Document Request Controller</h2>

    <h3>POST /api/document-requests — Create Document Request</h3>
    <input id="cr-senderIdKeccak" placeholder="senderIdKeccak">
    <input id="cr-receiverIdKeccak" placeholder="receiverIdKeccak">
    <input id="cr-senderHospitalId" placeholder="senderHospitalId">
    <input id="cr-receiverHospitalId" placeholder="receiverHospitalId">
    <input id="cr-groupId" placeholder="groupId">
    <button onclick="createRequest()">Create</button>

    <h3>GET /api/document-requests/receiver/{receiverIdKeccak} — Get by Receiver</h3>
    <input id="gr-receiverIdKeccak" placeholder="receiverIdKeccak">
    <button onclick="getByReceiver()">Get</button>

    <h3>GET /api/document-requests/receiver/{receiverIdKeccak}/status/{status} — Get by Receiver &amp; Status</h3>
    <input id="gs-receiverIdKeccak" placeholder="receiverIdKeccak">
    <input id="gs-status" placeholder="status (e.g. PENDING)">
    <button onclick="getByReceiverAndStatus()">Get</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
