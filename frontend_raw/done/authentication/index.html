<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Authentication</title>
</head>

<body>
    <h2>Authentication Controller</h2>

    <h3>POST /auth/doctor/login — Doctor Login</h3>
    <input id="dl-email" placeholder="email">
    <input id="dl-password" placeholder="password" type="password">
    <button onclick="loginDoctor()">Login Doctor</button>

    <h3>POST /auth/patient/login — Patient Login</h3>
    <input id="pl-email" placeholder="email">
    <input id="pl-password" placeholder="password" type="password">
    <button onclick="loginPatient()">Login Patient</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
