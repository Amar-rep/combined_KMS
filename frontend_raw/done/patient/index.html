<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Patient</title>
</head>

<body>
    <h2>Patient Controller</h2>

    <h3>POST /api/hospital/patients/register — Register Patient</h3>
    <input id="rp-patientIdKeccak" placeholder="patientIdKeccak">
    <input id="rp-name" placeholder="name">
    <input id="rp-email" placeholder="email">
    <input id="rp-phone" placeholder="phone">
    <input id="rp-dateOfBirth" placeholder="dateOfBirth (YYYY-MM-DD)">
    <input id="rp-address" placeholder="address">
    <input id="rp-password" placeholder="password" type="password">
    <button onclick="registerPatient()">Register</button>

    <h3>GET /api/hospital/patients/{id} — Get by ID</h3>
    <input id="gp-id" placeholder="id (Long)">
    <button onclick="getById()">Get</button>

    <h3>GET /api/hospital/patients/keccak/{patientIdKeccak} — Get by Keccak</h3>
    <input id="gk-keccak" placeholder="patientIdKeccak">
    <button onclick="getByKeccak()">Get</button>

    <h3>GET /api/hospital/patients — Get All</h3>
    <button onclick="getAll()">Get All</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
