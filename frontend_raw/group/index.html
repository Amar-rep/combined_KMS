<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Group</title>
</head>

<body>
    <h2>Group Controller</h2>

    <h3>POST /api/hospital/groups — Create Group</h3>
    <input id="cg-name" placeholder="name">
    <input id="cg-userIdKeccak" placeholder="userIdKeccak">
    <button onclick="createGroup()">Create</button>

    <h3>GET /api/hospital/groups/{id} — Get by DB ID</h3>
    <input id="gi-id" placeholder="id (Integer)">
    <button onclick="getById()">Get</button>

    <h3>GET /api/hospital/groups/group-id/{groupId} — Get by Group ID (string)</h3>
    <input id="gg-groupId" placeholder="groupId (String)">
    <button onclick="getByGroupId()">Get</button>

    <h3>GET /api/hospital/groups/user/{userIdKeccak} — Get by User</h3>
    <input id="gu-userIdKeccak" placeholder="userIdKeccak">
    <button onclick="getByUser()">Get</button>

    <h3>GET /api/hospital/groups — Get All</h3>
    <button onclick="getAll()">Get All</button>

    <h3>Response</h3>
    <pre id="response-output"></pre>
    <script src="script.js"></script>
</body>

</html>
